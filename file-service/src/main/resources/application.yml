# Cấu hình file-service — Spring Boot
# Dev profile: H2 in-memory, MinIO localhost

server:
  port: 8089

spring:
  application:
    name: file-service
  datasource:
    url: jdbc:h2:mem:filedb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  jackson:
    serialization:
      write-dates-as-timestamps: false

# MinIO config
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  buckets:
    files: chat-files
    thumbnails: chat-thumbnails

management:
  endpoints:
    web:
      exposure:
        include: health,info
