# gateway-service/src/main/resources/application.yml

server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # =========================================================
        # NHÓM 1: CÁC ROUTE CỤ THỂ LỒNG NHAU (PHẢI ĐẶT LÊN TRÊN)
        # =========================================================

        # Nhắn tin: Lấy tin nhắn của channel
        - id: messaging-messages
          uri: ${MESSAGING_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/channels/*/messages/**

        # Thông báo: Đánh dấu đã đọc
        - id: notification-ack
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/channels/*/ack/**

        # Quản lý Kênh: Tạo/xem danh sách kênh của server
        - id: channel-nested
          uri: ${CHANNEL_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/servers/*/channels/**

        # Phân quyền
        # Đặt ở đây để không bị server-service "nuốt" mất
        - id: role-service-nested
          uri: ${ROLE_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/servers/*/roles/**, /api/servers/*/members/*/roles/**, /api/servers/*/permissions/**, /api/servers/*/kick/**, /api/servers/*/ban/**

        # =========================================================
        # NHÓM 2: CÁC ROUTE TỔNG QUÁT (ĐẶT BÊN DƯỚI)
        # =========================================================

        # 1. Dịch vụ Xác thực & Cấp token
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        # 2. Dịch vụ Hồ sơ người dùng
        - id: user-profile-service
          uri: ${USER_PROFILE_URL:http://localhost:8089}
          predicates:
            - Path=/api/users/**

        # 3. Dịch vụ Quản lý Nhóm/Server
        - id: server-service
          uri: ${SERVER_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/servers/**

        # 4. Dịch vụ Kênh (Channel Service)
        - id: channel-service
          uri: ${CHANNEL_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/channels/**

        # 5. Dịch vụ Nhắn tin
        - id: messaging-service
          uri: ${MESSAGING_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/messages/**

        # 6. Dịch vụ Websocket (Real-time chat)
        - id: messaging-ws
          uri: ${MESSAGING_WS_URL:ws://localhost:8082}
          predicates:
            - Path=/ws/**

        # 7. Dịch vụ Trạng thái
        - id: presence-service
          uri: ${PRESENCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/presence/**

        # 8. Dịch vụ Thông báo tổng quát
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/notifications/**

        # 9. Dịch vụ Quản lý File
        - id: file-service
          uri: ${FILE_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/files/**

        # 10. Dịch vụ Log
        - id: log-service
          uri: ${LOG_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/logs/**

# Cấu hình bảo mật để JwtAuthFilter sử dụng
jwt:
  secret: chatsever-jwt-secret-key-2026-safe-key

# Cấu hình Health Check (G3)
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always