# Docker Compose — Phase 1: RabbitMQ + log-service
# Khi team dev xong service khác (auth/messaging/presence/gateway) → thêm vào đây.
# Chạy: docker compose up -d

services:

  # Message broker — trung gian truyền event giữa các service
  rabbitmq:
    image: rabbitmq:3-management
    container_name: chat-rabbitmq
    ports:
      - "5672:5672"      # AMQP protocol
      - "15672:15672"    # Web UI quản lý (http://localhost:15672, login: guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chat-net

  # Service ghi log — nhận event từ RabbitMQ, expose REST API xem history
  log-service:
    build:
      context: .                        # Build từ project root (cần common-lib)
      dockerfile: log-service/Dockerfile
    image: chatsever/log-service:1.0.0-SNAPSHOT
    container_name: chat-log-service
    ports:
      - "8084:8084"
    environment:
      # Override application.yml cho môi trường Docker
      SPRING_RABBITMQ_HOST: rabbitmq    # Tên container RabbitMQ trong Docker network
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy      # Đợi RabbitMQ sẵn sàng mới start
    volumes:
      - ./log-service/logs:/app/logs    # Mount file log ra host để debug
    networks:
      - chat-net

   # API Gateway — Cửa ngõ duy nhất điều hướng request
  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    image: chatsever/gateway-service:1.0.0-SNAPSHOT
    container_name: chat-gateway-service
    ports:
      - "8080:8080"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - chat-net

   # Dịch vụ quản lý trạng thái online/offline
  presence-service:
    build:
      context: .
      dockerfile: presence-service/Dockerfile
    image: chatsever/presence-service:1.0.0-SNAPSHOT
    container_name: chat-presence-service
    ports:
      - "8083:8083"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - chat-net
  # Messaging Service
  messaging-service:
    build:
      context: .
      dockerfile: messaging-service/Dockerfile
    image: chatsever/messaging-service:1.0.0-SNAPSHOT
    container_name: chat-messaging-service
    ports:
      - "8082:8082"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      PRESENCE_SERVICE_URL: http://presence-service:8083/api/presence
    depends_on:
      rabbitmq:
        condition: service_healthy
      presence-service:
        condition: service_started
    networks:
      - chat-net

  # MinIO — S3-compatible object storage cho file-service
  minio:
    image: minio/minio:latest
    container_name: chat-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # Web Console (http://localhost:9001, login: minioadmin/minioadmin)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chat-net

  # Notification Service — mention, unread count, push notification
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: chatsever/notification-service:1.0.0-SNAPSHOT
    container_name: chat-notification-service
    ports:
      - "8088:8088"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - chat-net

  # File Service — upload/download file, thumbnail ảnh
  file-service:
    build:
      context: .
      dockerfile: file-service/Dockerfile
    image: chatsever/file-service:1.0.0-SNAPSHOT
    container_name: chat-file-service
    ports:
      - "8089:8089"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - chat-net

networks:
  chat-net:
    driver: bridge

volumes:
  minio-data:

