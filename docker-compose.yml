version: '3.8'

services:
  # --- HẠ TẦNG CỐT LÕI (INFRASTRUCTURE) ---
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - chat-net

  mysql-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chat_server_db
    ports:
      - "3307:3306"
    networks:
      - chat-net

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - chat-net

  # --- MICROSERVICES ---
  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    ports:
      - "8080:8080" # Cánh cửa chính của toàn hệ thống
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - SERVER_SERVICE_URL=http://server-service:8085
      - CHANNEL_SERVICE_URL=http://channel-service:8086
      - MESSAGING_SERVICE_URL=http://messaging-service:8082
      - MESSAGING_WS_URL=ws://messaging-service:8082
      - PRESENCE_SERVICE_URL=http://presence-service:8083
      - FILE_SERVICE_URL=http://file-service:8089
      - LOG_SERVICE_URL=http://log-service:8087
      - NOTIFICATION_SERVICE_URL=http://notification-service:8088
    depends_on:
      - auth-service
      - messaging-service
    networks:
      - chat-net

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    networks:
      - chat-net
    depends_on:
      - mysql-db

  # server-service: chưa có code/Dockerfile — bỏ comment khi sẵn sàng
  # server-service:
  #   build:
  #     context: .
  #     dockerfile: server-service/Dockerfile
  #   networks:
  #     - chat-net
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_server_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
  #     - SPRING_DATASOURCE_USERNAME=root
  #     - SPRING_DATASOURCE_PASSWORD=root
  #     - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQL8Dialect
  #     - CHANNEL_SERVICE_URL=http://channel-service:8086
  #   depends_on:
  #     - mysql-db
  #     - channel-service

  # channel-service: chưa có code/Dockerfile — bỏ comment khi sẵn sàng
  # channel-service:
  #   build:
  #     context: .
  #     dockerfile: channel-service/Dockerfile
  #   networks:
  #     - chat-net
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_channel_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
  #     - SPRING_DATASOURCE_USERNAME=root
  #     - SPRING_DATASOURCE_PASSWORD=root
  #     - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQL8Dialect
  #     - MYSQL_HOST=mysql-db
  #     - MYSQL_PASSWORD=root
  #   depends_on:
  #     - mysql-db

  messaging-service:
    build:
      context: .
      dockerfile: messaging-service/Dockerfile
    networks:
      - chat-net
    depends_on:
      - rabbitmq

  presence-service:
    build:
      context: .
      dockerfile: presence-service/Dockerfile
    networks:
      - chat-net
    environment:
      - MYSQL_HOST=mysql-db
      - MYSQL_PASSWORD=root
    depends_on:
      - mysql-db

  log-service:
    build:
      context: .
      dockerfile: log-service/Dockerfile
    networks:
      - chat-net
    depends_on:
      - rabbitmq

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "8088:8088"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    depends_on:
      - rabbitmq
    networks:
      - chat-net

  file-service:
    build:
      context: .
      dockerfile: file-service/Dockerfile
    ports:
      - "8089:8089"
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
    depends_on:
      - minio
    networks:
      - chat-net

networks:
  chat-net:
    driver: bridge
