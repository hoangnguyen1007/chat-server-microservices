  #     - SPRING_DATASOURCE_USERNAME=root
  #     - SPRING_DATASOURCE_PASSWORD=root
  #   depends_on:
  #     - mysql-db
  #
  # user-profile-service:
  #   build:
  #     context: .
  #     dockerfile: user-profile-service/Dockerfile
  #   networks:
  #     - chat-net
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_profile_db?createDatabaseIfNotExist=true&useSSL=false
  #     - SPRING_DATASOURCE_USERNAME=root
  #     - SPRING_DATASOURCE_PASSWORD=root
  #   depends_on:
  #     - mysql-db

networks:
  chat-net:
    driver: bridge