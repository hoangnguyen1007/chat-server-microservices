# Cấu hình notification-service — Spring Boot
# Dev profile: H2 in-memory, RabbitMQ localhost

server:
  port: 8088

spring:
  application:
    name: notification-service
  # Dev: H2 in-memory | Docker: MySQL (override bằng env vars)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:notificationdb}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:create-drop}
    show-sql: true
  h2:
    console:
      enabled: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
